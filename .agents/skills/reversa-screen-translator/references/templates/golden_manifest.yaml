# golden/manifest.yaml
#
# Manifesto dos golden files emitidos pelo Screen Translator. O Inspector consome
# este arquivo para construir parity tests construtivos quando o oráculo legado
# está disponível e a captura foi possível.
#
# Em v1, captura automatizada via Docker/Wine/emulador é OQ-02 (não implementada).
# Este manifesto descreve o comando sugerido por tela; usuário roda manualmente.
# Em projetos sem oráculo executável, este arquivo pode existir vazio (lista de
# golden files com `present: false`) ou não existir, e o Inspector ignora.

schemaVersion: 1
generatedAt: <ISO-8601>
reversa:
  version: "x.y.z"
producedBy: screen-translator
sourcePlatform: <slug>
targetPlatform: <slug>
oracleAvailable: true | false
oracleHash: "sha256:<hash do binário ou container do oráculo, quando aplicável>"
oracleCommand: "<comando base para invocar o oráculo, ex: 'docker run --rm -i legacy-atm:1.0'>"

normalizationRules:
  # Regras aceitas na comparação byte-a-byte. Tudo fora daqui é divergência real.
  - lineEndings: "\n"           # converter CRLF → LF antes de comparar
  - trimTrailingSpaces: false   # padrão: nunca trimmar
  - stripAnsiColors: false      # padrão: nunca strippar; ANSI faz parte do contrato
  - normalizeUtf8: true         # converter encoding heterogêneo para UTF-8
  - injectClock: "2026-01-01T00:00:00Z"  # clock fake para captura determinística
  - seedRandom: 42              # seed fixo

screens:
  - name: <nome-canonical-da-tela>
    legacyOrigin: "<arquivo:linha>"
    capture:
      command: "<comando completo de captura, ex: 'echo -e \"1\\n123456\\n0\\n\" | docker run --rm -i legacy-atm:1.0 > tela_login.txt'>"
      expectedExitCode: 0
      determinismStrategy: "fake-clock + fixed-seed"
    file: "tela-login.txt"          # caminho relativo a _reversa_sdd/screens/golden/
    format: "ansi-byte-stream"      # ansi-byte-stream | png | html-css-snapshot | raw
    present: true                   # false quando o usuário ainda não rodou a captura
    captureBy: "<nome-do-usuario-ou-CI>"
    capturedAt: "<ISO-8601>"
    sha256: "<hash do arquivo capturado, ou null quando present=false>"
    deviations: [DEV-XXX, DEV-YYY]  # lista de deviations conhecidas para esta tela
    notes: "<observações específicas, ex: 'oráculo emite trailing space que ignoramos via trimTrailingSpaces na comparação'>"

  - name: <segunda-tela>
    # ...

# Telas para as quais a captura determinística não foi possível.
nonDeterministic:
  - name: <tela-com-relogio-externo>
    reason: "<descrição da fonte de não-determinismo>"
    fallback: "amostragem por N execuções; golden file = comum a todas"
    samples: 5
    deviations: [DEV-021]

# Telas em projetos sem UI ou em modo skipped.
skipped:
  reason: "<ex: legado é batch puro, agente Screen Translator pulado>"
  emittedAt: <ISO-8601>
