# vendor-pins.yaml
#
# Matriz oficial de bibliotecas de terceiros usadas pelas páginas geradas pelo
# Time Reversa Docs. O Publisher consome este arquivo no passo "Bundle vendor
# local" para baixar cada lib em assets/vendor/ antes de renderizar qualquer
# página, garantindo que o mini-site funcione 100% offline e via file://.
#
# Regras:
#  - "version" é o pin canônico. Não mude major/minor sem revisar todas as
#    skills que dependem da combinação (Code City, force-directed, dashboards).
#  - "format" pode ser "iife" (compatível com <script src>) ou "esm" (precisa
#    de importmap + <script type=module>). Hoje fixamos tudo em IIFE para que
#    duplo clique no Windows funcione sem dependência de bundler.
#  - "compatible_with" declara dependências entre libs. Use para detectar
#    combinações inválidas (ex: OrbitControls de r158 não roda como IIFE).
#  - "files[].url" é a primeira tentativa. Se ela falhar (HEAD != 200), o
#    Publisher percorre "fallbacks" na ordem. Sempre prefira pelo menos 2
#    CDNs por arquivo: unpkg + jsdelivr cobrem 99% das falhas observadas.
#  - "local" é o caminho relativo dentro de _reversa_docs/. Os
#    templates HTML referenciam exatamente esse caminho via <script src>.

schema_version: 1

libs:

  three:
    version: "0.147.0"
    format: iife
    notes: >
      Travado em 0.147 porque é a última release que ainda publica OrbitControls
      em formato IIFE (examples/js/controls/). A partir de 0.150 só existe a
      versão ES module em examples/jsm/, que exige importmap. Migrar para 0.158+
      com importmap é trabalho futuro e está documentado no Erro 3 do relatório
      de campo (specs/erros_em_docs.md).
    files:
      - url: "https://unpkg.com/three@0.147.0/build/three.min.js"
        local: "assets/vendor/three.min.js"
        fallbacks:
          - "https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"
          - "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.147.0/three.min.js"

  orbit_controls:
    version: "0.147.0"
    format: iife
    compatible_with: ["three@0.147.0"]
    notes: >
      Versão IIFE de OrbitControls, descontinuada a partir de three@0.150.
      Mantida via raw.githubusercontent (mais estável que mirrors de CDN para
      arquivos que não fazem parte do bundle oficial npm).
    files:
      - url: "https://raw.githubusercontent.com/mrdoob/three.js/r147/examples/js/controls/OrbitControls.js"
        local: "assets/vendor/OrbitControls.js"
        fallbacks:
          - "https://cdn.jsdelivr.net/gh/mrdoob/three.js@r147/examples/js/controls/OrbitControls.js"

  d3:
    version: "7.8.5"
    format: iife
    files:
      - url: "https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js"
        local: "assets/vendor/d3.v7.min.js"
        fallbacks:
          - "https://unpkg.com/d3@7.8.5/dist/d3.min.js"
          - "https://d3js.org/d3.v7.min.js"

  highcharts:
    version: "11.4.8"
    format: iife
    notes: >
      Core do Highcharts. Os módulos (treemap, sankey, etc) devem ser da MESMA
      versão para não disparar warning de compat no console.
    files:
      - url: "https://code.highcharts.com/11.4.8/highcharts.js"
        local: "assets/vendor/highcharts.js"
        fallbacks:
          - "https://cdn.jsdelivr.net/npm/highcharts@11.4.8/highcharts.js"
          - "https://unpkg.com/highcharts@11.4.8/highcharts.js"

  highcharts_accessibility:
    version: "11.4.8"
    format: iife
    compatible_with: ["highcharts@11.4.8"]
    files:
      - url: "https://code.highcharts.com/11.4.8/modules/accessibility.js"
        local: "assets/vendor/highcharts-accessibility.js"
        fallbacks:
          - "https://cdn.jsdelivr.net/npm/highcharts@11.4.8/modules/accessibility.js"

  highcharts_exporting:
    version: "11.4.8"
    format: iife
    compatible_with: ["highcharts@11.4.8"]
    files:
      - url: "https://code.highcharts.com/11.4.8/modules/exporting.js"
        local: "assets/vendor/highcharts-exporting.js"
        fallbacks:
          - "https://cdn.jsdelivr.net/npm/highcharts@11.4.8/modules/exporting.js"

  highcharts_treemap:
    version: "11.4.8"
    format: iife
    compatible_with: ["highcharts@11.4.8"]
    files:
      - url: "https://code.highcharts.com/11.4.8/modules/treemap.js"
        local: "assets/vendor/highcharts-treemap.js"
        fallbacks:
          - "https://cdn.jsdelivr.net/npm/highcharts@11.4.8/modules/treemap.js"

  highcharts_sankey:
    version: "11.4.8"
    format: iife
    compatible_with: ["highcharts@11.4.8"]
    files:
      - url: "https://code.highcharts.com/11.4.8/modules/sankey.js"
        local: "assets/vendor/highcharts-sankey.js"
        fallbacks:
          - "https://cdn.jsdelivr.net/npm/highcharts@11.4.8/modules/sankey.js"

  highcharts_timeline:
    version: "11.4.8"
    format: iife
    compatible_with: ["highcharts@11.4.8"]
    notes: >
      Usado pelo Analyst quando há chronicle.md para gerar timeline.html.
    files:
      - url: "https://code.highcharts.com/11.4.8/modules/timeline.js"
        local: "assets/vendor/highcharts-timeline.js"
        fallbacks:
          - "https://cdn.jsdelivr.net/npm/highcharts@11.4.8/modules/timeline.js"

# Combinações declaradamente inválidas. O Publisher rejeita estas combinações
# se alguém tentar mudar via override.
invalid_combinations:
  - three: "0.158.0"
    orbit_controls: "0.147.0"
    reason: "OrbitControls IIFE foi removido em three@0.150+. Use three@0.147 com OrbitControls r147 ou migre tudo para ESM com importmap."
  - three: "0.147.0"
    orbit_controls: "0.158.0"
    reason: "API de OrbitControls mudou na trilha ESM-only; r158 não roda como IIFE."

# Tabela de uso: qual skill usa qual lib. Mantenha sincronizada quando
# adicionar/remover skills ou libs. O Publisher usa isso para decidir o que
# baixar mesmo quando uma página específica é regenerada isolada.
usage:
  reversa-arquitetura-3d: [three, orbit_controls]
  reversa-especialista-d3: [d3]
  reversa-highcharts-visualizer:
    [highcharts, highcharts_accessibility, highcharts_exporting,
     highcharts_treemap, highcharts_sankey, highcharts_timeline]
